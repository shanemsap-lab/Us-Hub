// ---------- helpers ----------
const uid = () => Math.random().toString(36).slice(2, 9);
const fmt$ = (n) => Number(n).toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
const todayStr = () => new Date().toISOString().slice(0, 10);
const midnight = () => { const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate()); };
const relDays = (dateStr) => {
  const d = new Date(dateStr + "T12:00:00");
  return Math.round((new Date(d.getFullYear(), d.getMonth(), d.getDate()) - midnight()) / 86400000);
};
const rel = (n) => n === 0 ? "today" : n === 1 ? "tomorrow" : n === -1 ? "yesterday" : n > 0 ? `in ${n}d` : `${-n}d ago`;
const relTs = (ts) => {
  const mins = Math.round((Date.now() - ts) / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.round(hrs / 24)}d ago`;
};
const fmtDate = (d) => d ? new Date(d + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "";
const clampDOM = (day, y, m) => Math.min(day, new Date(y, m + 1, 0).getDate());
function nextOccurrence(dayOfMonth) {
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth();
  let d = new Date(y, m, clampDOM(dayOfMonth, y, m));
  if (d < midnight()) d = new Date(y, m + 1, clampDOM(dayOfMonth, y, m + 1));
  return d;
}
function nextMonthiversary(annStr) {
  const ann = new Date(annStr + "T12:00:00");
  const d = nextOccurrence(ann.getDate());
  const months = (d.getFullYear() - ann.getFullYear()) * 12 + (d.getMonth() - ann.getMonth());
  return { date: d, months, days: Math.round((d - midnight()) / 86400000) };
}
// Pull a readable address out of a Zillow / Realtor / Redfin URL
function addressFromLink(url) {
  try {
    const u = new URL(url);
    const host = u.hostname;
    let slug = "";
    if (/zillow\.com$/.test(host) || host.includes("zillow")) {
      const m = u.pathname.match(/homedetails\/([^/]+)\//);
      if (m) slug = m[1];
    } else if (host.includes("realtor.com")) {
      const m = u.pathname.match(/realestateandhomes-detail\/([^/]+)/);
      if (m) slug = m[1];
    } else if (host.includes("redfin.com")) {
      const parts = u.pathname.split("/").filter(Boolean);
      slug = parts.find((p) => /\d/.test(p) && p.includes("-")) || "";
    }
    if (!slug) return "";
    return decodeURIComponent(slug)
      .replace(/[_-]+/g, " ")
      .replace(/\s+\d{5}(?:\s.*)?$/, "")
      .replace(/\s+/g, " ")
      .trim();
  } catch { return ""; }
}
// localStorage that won't crash in restricted contexts
const safeLS = {
  get(k) { try { return localStorage.getItem(k); } catch { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch {} },
};

// ---------- firebase ----------
const configured = !String(firebaseConfig.apiKey).includes("PASTE");
let db = null, auth = null, fb = null, messaging = null, fcm = null;
async function initFirebase() {
  const [{ initializeApp }, authMod, fsMod] = await Promise.all([
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"),
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"),
  ]);
  const app = initializeApp(firebaseConfig);
  auth = authMod.getAuth(app);
  db = fsMod.getFirestore(app);
  fb = { ...authMod, ...fsMod };
  // Messaging isn't supported everywhere (e.g. Safari tab that isn't an installed PWA) — fail soft.
  try {
    const m = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js");
    if (await m.isSupported()) { messaging = m.getMessaging(app); fcm = m; }
  } catch {}
}

// ---------- atoms ----------
const Who = ({ who, initialOnly }) => html`

  const hgt = 92 * clamped;

        <rect x="0" y=${112 - hgt} width="140" height=${hgt + 4} fill="#1D5C63" opacity="0.9" />
        <path d="M0 ${112 - hgt} q 17 -7 35 0 t 35 0 t 35 0 t 35 0 V 116 H 0 Z" fill="#1D5C63" />

      <path d="M70 8 L128 52 L118 52 L118 112 L22 112 L22 52 L12 52 Z" fill="none" stroke="#22333B" stroke-width="3" stroke-linejoin="round" />

};

// Reusable comment thread — items already filtered to this parent by the caller
function Comments({ items = [], onAdd, me }) {
  const [open, setOpen] = useState(false);
  const [text, setText] = useState("");
  const submit = () => {
    if (!text.trim()) return;
    onAdd(text.trim());
    setText("");
  };
  return html`
    <div style=${{ marginTop: "8px" }}>
      <button class="ghost" onClick=${() => setOpen(!open)}>
        💬 ${items.length || ""} ${items.length === 1 ? "comment" : "comments"}

      ${open && html`
        <div>
          ${items.map((c) => html`
            <div key=${c.id} class="comment">
              <p style=${{ fontSize: "13px", color: "#22333B", margin: 0 }}>${c.text}</p>
              <p style=${{ fontSize: "11px", color: "#6E6754", margin: "2px 0 0" }}>
                <${Who} who=${c.who} initialOnly /> · ${relTs(c.ts)}

            </div>`)}
          <div class="row" style=${{ marginTop: "8px" }}>
            <input value=${text} onInput=${(e) => setText(e.target.value)}
              onKeyDown=${(e) => e.key === "Enter" && submit()} placeholder="Say something…" />
            <button class="btn sub" style=${{ flex: "0 0 auto" }} onClick=${submit}>Post</button>
          </div>
        </div>`}
    </div>`;
}

// ---------- app ----------
function App() {
  const [phase, setPhase] = useState(configured ? "loading" : "setup");
  const [user, setUser] = useState(null);
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("today");
  const [showFeed, setShowFeed] = useState(false);
  const [lastSeen, setLastSeen] = useState(Number(safeLS.get("lastSeen") || 0));
  const [notifOn, setNotifOn] = useState(typeof Notification !== "undefined" && Notification.permission === "granted");
  const [pulse, setPulse] = useState(null);
  const [lastTap, setLastTap] = useState(null);
  const [undo, setUndo] = useState(null);
  const [confirmState, setConfirmState] = useState(null);
  const [errToast, setErrToast] = useState(null);
  const [inboxItems, setInboxItems] = useState([]);
  const [activityLog, setActivityLog] = useState([]);
  const [commentsAll, setCommentsAll] = useState([]);
  const pulseTimer = useRef(null);
  const undoTimer = useRef(null);
  const errTimer = useRef(null);
  const tapsReady = useRef(false);
  const prevActIds = useRef(new Set());
  const meRef = useRef(null);

  const me = user ? EMAILS[(user.email || "").toLowerCase()] : null;
  meRef.current = me;

  useEffect(() => {
    if (!configured) return;
    (async () => {
      await initFirebase();
      fb.onAuthStateChanged(auth, (u) => {
        setUser(u);
        setPhase(u ? "app" : "signin");
      });
    })();
  }, []);

  useEffect(() => {
    if (phase !== "app" || !me) return;
    const ref = fb.doc(db, "hub", "main");
    const unsub = fb.onSnapshot(ref, async (snap) => {
      if (!snap.exists()) {
        await fb.setDoc(ref, SEED);
        return;
      }
      const d = { ...structuredClone(SEED), ...snap.data() };
      setData(d);
    });
    return unsub;
  }, [phase, me]);

  // Inbox (brain dump) and activity live in their own collections, one doc per
  // item, so two simultaneous edits merge instead of one silently clobbering
  // the other the way a single shared "whole document" write would.
  useEffect(() => {
    if (phase !== "app" || !me) return;
    const q = fb.query(fb.collection(db, "inbox"), fb.orderBy("ts", "desc"), fb.limit(60));
    return fb.onSnapshot(q, (snap) => setInboxItems(snap.docs.map((doc) => ({ id: doc.id, ...doc.data() }))));
  }, [phase, me]);

  useEffect(() => {
    if (phase !== "app" || !me) return;
    const q = fb.query(fb.collection(db, "activity"), fb.orderBy("ts", "desc"), fb.limit(50));
    const unsub = fb.onSnapshot(q, (snap) => {
      const log = snap.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
      prevActIds.current = new Set(log.map((a) => a.id));
      setActivityLog(log);
    });
    return unsub;
  }, [phase, me]);

  useEffect(() => {
    if (phase !== "app" || !me) return;
    return fb.onSnapshot(fb.collection(db, "comments"), (snap) => setCommentsAll(snap.docs.map((doc) => ({ id: doc.id, ...doc.data() }))));
  }, [phase, me]);

  // ---- taps (v2) ----
  // Buzzes THIS device only — there's no web API to trigger haptics on a remote
  // phone directly. Android push notifications can carry a vibrate pattern;
  // iOS Safari ignores it, so cross-device "feel it" only works with the app open.
  const showPulse = (who, caption) => {
    clearTimeout(pulseTimer.current);
    setPulse({ who, caption, key: Date.now() });
    if (navigator.vibrate) { try { navigator.vibrate([60, 40, 60]); } catch {} }
    pulseTimer.current = setTimeout(() => setPulse(null), 1900);
  };

  const showError = useCallback((message) => {
    clearTimeout(errTimer.current);
    setErrToast({ message, key: Date.now() });
    errTimer.current = setTimeout(() => setErrToast(null), 5000);
  }, []);

  const askConfirm = useCallback((message, onConfirm) => {
    setConfirmState({ message, onConfirm });
  }, []);

  useEffect(() => {
    if (phase !== "app" || !me) return;
    const q = fb.query(fb.collection(db, "taps"), fb.orderBy("ts", "desc"), fb.limit(1));
    const unsub = fb.onSnapshot(q, (snap) => {
      const t = snap.docs[0] && snap.docs[0].data();
      if (!t) { tapsReady.current = true; return; }
      setLastTap(t);
      if (tapsReady.current && t.who !== meRef.current && Date.now() - t.ts < 90000) {
        showPulse(t.who, t.caption);
        // The OS-level notification for this tap is sent by the onTap Cloud
        // Function (functions/index.js) so it reaches the home screen even
        // when this tab is closed — no client-side Notification() call needed here.
      }
      tapsReady.current = true;
    });
    return unsub;
  }, [phase, me]);

  const sendTap = () => {
    const caption = TAP_CAPTIONS[Math.floor(Math.random() * TAP_CAPTIONS.length)];
    fb.addDoc(fb.collection(db, "taps"), { who: meRef.current, ts: Date.now(), caption });
    showPulse(meRef.current, caption);
  };

  const registerPush = useCallback(async () => {
    if (!messaging || !fcm || String(VAPID_KEY).includes("PASTE")) return;
    try {
      const reg = await navigator.serviceWorker.register("./firebase-messaging-sw.js");
      const token = await fcm.getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
      if (token) await fb.setDoc(fb.doc(db, "hub", "push"), { [meRef.current]: fb.arrayUnion(token) }, { merge: true });
    } catch (e) { console.warn("Push setup skipped:", e); }
  }, []);

  // Keep the push token fresh whenever we're signed in with permission already granted
  useEffect(() => {
    if (phase === "app" && me && notifOn) registerPush();
  }, [phase, me, notifOn, registerPush]);

  const logActivity = useCallback((text) => {
    fb.addDoc(fb.collection(db, "activity"), { who: meRef.current, text, ts: Date.now() }).catch(() => {});
  }, []);

  const addInboxItem = useCallback((text) => {
    fb.addDoc(fb.collection(db, "inbox"), { text, who: meRef.current, date: todayStr(), ts: Date.now() })
      .catch(() => showError("Couldn't save that — check your connection and try again."));
    logActivity(`dumped a thought: "${text.slice(0, 40)}${text.length > 40 ? "…" : ""}"`);
  }, [logActivity, showError]);

  const deleteInboxItem = useCallback((item) => {
    fb.deleteDoc(fb.doc(db, "inbox", item.id)).catch(() => showError("Couldn't delete that — try again."));
    showUndo("Thought cleared", () => fb.addDoc(fb.collection(db, "inbox"), { text: item.text, who: item.who, date: item.date, ts: item.ts }));
  }, [showError]);

  const addComment = useCallback((parentId, text) => {
    fb.addDoc(fb.collection(db, "comments"), { parentId, who: meRef.current, text, ts: Date.now() })
      .catch(() => showError("Couldn't post that comment — try again."));
  }, [showError]);

  const update = useCallback((fn, actText) => {
    setData((prev) => {
      const next = fn(structuredClone(prev));
      fb.setDoc(fb.doc(db, "hub", "main"), next).catch(() => showError("Couldn't save that — check your connection and try again."));
      return next;
    });
    if (actText) logActivity(actText);
  }, [showError, logActivity]);

  const signIn = async () => {
    const provider = new fb.GoogleAuthProvider();
    try { await fb.signInWithPopup(auth, provider); }
    catch { try { await fb.signInWithRedirect(auth, provider); } catch (e) { showError("Sign-in failed: " + e.message); } }
  };

  const openFeed = () => {
    setShowFeed(!showFeed);
    const now = Date.now();
    setLastSeen(now);
    safeLS.set("lastSeen", String(now));
  };

  const askNotif = async () => {
    if (typeof Notification === "undefined") return showError("This browser doesn't support notifications.");
    const p = await Notification.requestPermission();
    setNotifOn(p === "granted");
    if (p === "granted") registerPush();
  };

  if (phase === "setup") return html`
    <div style=${{ padding: "48px 24px", textAlign: "center" }}>
      <h1 class="display">Us.</h1>
      <p style=${{ color: "#5B5647", fontSize: "14px" }}>Almost there — open <code>index.html</code>, paste your Firebase config and your two Gmail addresses into the SETUP block at the top, then reload. Full steps in the README.</p>
    </div>`;

  if (phase === "loading") return html`
    <p style=${{ padding: "24px", fontFamily: "Public Sans, sans-serif" }}>Loading your hub…</p>`;

  if (phase === "signin") return html`
    <div style=${{ padding: "48px 24px", textAlign: "center" }}>
      <p class="eyebrow">an hour apart · never far</p>
      <h1 class="display" style=${{ margin: "8px 0 6px" }}>Us.</h1>
      <p style=${{ color: "#5B5647", marginBottom: "28px", fontSize: "14px" }}>Two people, one hour of highway, zero excuses.</p>
      <button class="btn" onClick=${signIn}>Sign in with Google</button>
    </div>`;

  if (!me) return html`
    <div style=${{ padding: "48px 24px", textAlign: "center" }}>
      <h1 class="display">Hm.</h1>
      <p style=${{ color: "#5B5647", fontSize: "14px" }}>${user.email} isn't on the list. If it should be, add it to the EMAILS block in index.html.</p>
      <button class="ghost" onClick=${() => fb.signOut(auth)}>Sign out</button>
    </div>`;

  if (!data) return html`<div style=${{ padding: "48px 24px", textAlign: "center" }}><p class="eyebrow">signed in as ${user.email}</p><h1 class="display">Opening your hub…</h1><p style=${{ color: "#5B5647", fontSize: "14px" }}>Stuck here? This Google account may not have access to the hub.</p><button class="ghost" onClick=${() => fb.signOut(auth)}>Sign out & try another account</button></div>`;
  const unread = activityLog.filter((a) => a.ts > lastSeen && a.who !== me).length;

  return html`
    <div>
      ${pulse && html`
        <div class="pulse" key=${pulse.key} aria-hidden="true">
          <span class="ring" style=${{ background: PEOPLE[pulse.who].color }}></span>
          <span class="heart">${pulse.who === me ? "💌" : "💓"}</span>
          ${pulse.caption && html`<span class="caption">${pulse.caption}</span>`}
        </div>`}
      ${undo && html`
        <div class="toast" key=${undo.key}>
          <span>${undo.label}</span>
          <button onClick=${() => { undo.restore(); setUndo(null); }}>Undo</button>
        </div>`}
      ${errToast && html`
        <div class="toast" style=${{ background: "#B4552D" }} key=${errToast.key}>
          <span>${errToast.message}</span>
          <button onClick=${() => setErrToast(null)}>Dismiss</button>
        </div>`}
      ${confirmState && html`
        <div style=${{ position: "fixed", inset: 0, zIndex: 80, background: "rgba(34,51,59,0.4)", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}
          onClick=${() => setConfirmState(null)}>
          <div class="card" style=${{ maxWidth: "340px", margin: 0 }} onClick=${(e) => e.stopPropagation()}>
            <p style=${{ fontSize: "15px", color: "#22333B", margin: "0 0 16px" }}>${confirmState.message}</p>
            <div style=${{ display: "flex", gap: "10px", justifyContent: "flex-end" }}>
              <button class="ghost" onClick=${() => setConfirmState(null)}>Cancel</button>
              <button class="btn" style=${{ background: "#B4552D" }} onClick=${() => { confirmState.onConfirm(); setConfirmState(null); }}>Delete</button>
            </div>
          </div>
        </div>`}
      <header style=${{ padding: "18px 18px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <p class="eyebrow">one hour of 95 · zero distance</p>
          <h1 class="display" style=${{ margin: 0 }}>Us.</h1>
        </div>
        <div style=${{ display: "flex", gap: "8px", alignItems: "center" }}>
          <button class="bell" onClick=${openFeed} aria-label="Activity">
            🔔${unread > 0 && html`<span class="badge">${unread}</span>`}
          </button>
          <button class="ghost" onClick=${() => fb.signOut(auth)}>${PEOPLE[me].name} · out</button>
        </div>
      </header>

      ${showFeed && html`
        <div class="card" style=${{ margin: "12px 18px 0" }}>
          <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
            <h2 style=${{ margin: 0 }}>What's new</h2>
            ${!notifOn && html`<button class="ghost" onClick=${askNotif}>enable alerts</button>`}
          </div>
          ${activityLog.length === 0 && html`<p class="empty">Quiet so far. Everything you two do shows up here.</p>`}
          ${activityLog.slice(0, 25).map((a) => html`
            <div key=${a.id} style=${{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid #F0EBDD", gap: "8px" }}>
              <span style=${{ fontSize: "13px", color: "#22333B" }}>
                <${Who} who=${a.who} initialOnly /> <span style=${{ marginLeft: "6px" }}>${a.text}</span>
              </span>
              <span style=${{ fontSize: "12px", color: "#6E6754", whiteSpace: "nowrap" }}>${relTs(a.ts)}</span>
            </div>`)}
        </div>`}

      <nav class="tabs">
        ${[["today", "Today"], ["us", "Us"], ["money", "Money"], ["house", "House"], ["lists", "Lists"], ["plans", "Plans"]].map(([k, label]) => html`
          <button key=${k} class=${tab === k ? "tab active" : "tab"} onClick=${() => setTab(k)}>${label}</button>`)}
      </nav>

      <main style=${{ padding: "16px 18px 40px" }}>
        ${tab === "today" && html`<${Today} data=${data} update=${update} me=${me} sendTap=${sendTap} lastTap=${lastTap} notifOn=${notifOn} askNotif=${askNotif} showUndo=${showUndo} inboxItems=${inboxItems} addInboxItem=${addInboxItem} deleteInboxItem=${deleteInboxItem} />`}
        ${tab === "us" && html`<${Us} data=${data} update=${update} me=${me} showUndo=${showUndo} />`}
        ${tab === "money" && html`<${Money} data=${data} update=${update} me=${me} showUndo=${showUndo} askConfirm=${askConfirm} />`}
        ${tab === "house" && html`<${House} data=${data} update=${update} me=${me} showUndo=${showUndo} askConfirm=${askConfirm} comments=${commentsAll} addComment=${addComment} />`}
        ${tab === "lists" && html`<${StoreLists} data=${data} update=${update} me=${me} showUndo=${showUndo} askConfirm=${askConfirm} />`}
        ${tab === "plans" && html`<${Plans} data=${data} update=${update} me=${me} showUndo=${showUndo} askConfirm=${askConfirm} comments=${commentsAll} addComment=${addComment} />`}
      </main>
    </div>`;
}

// ---------- TODAY ----------
function Today({ data, update, me, sendTap, lastTap, notifOn, askNotif, showUndo, inboxItems, addInboxItem, deleteInboxItem }) {
  const [dump, setDump] = useState("");
  const [visitDate, setVisitDate] = useState("");
  const [visitNote, setVisitNote] = useState("");
  const [editingVisit, setEditingVisit] = useState(false);

  const daysTogether = -relDays(data.anniversary);
  const mv = nextMonthiversary(data.anniversary);
  const visit = data.nextVisit;
  const visitDays = visit ? relDays(visit.date) : null;
  const visitPassed = visit && visitDays < 0;

  const horizon = [];
  if (visit && visitDays >= 0 && visitDays <= 30)
    horizon.push({ days: visitDays, label: `See each other${visit.note ? " — " + visit.note : ""} 🫶`, date: visit.date });
  if (mv.days <= 30)
    horizon.push({ days: mv.days, label: `${mv.months} months together 🎉`, date: mv.date.toISOString().slice(0, 10) });
  (data.bills || []).forEach((b) => {
    const due = nextOccurrence(b.dueDay);
    const days = Math.round((due - midnight()) / 86400000);
    if (days <= 21) horizon.push({ days, label: `${b.name}${b.amount ? " · " + fmt$(b.amount) : ""}`, date: due.toISOString().slice(0, 10) });
  });
  (data.dates || []).forEach((d) => {
    const days = relDays(d.date);
    if (days >= 0 && days <= 30) horizon.push({ days, label: d.title, date: d.date });
  });
  horizon.sort((a, b) => a.days - b.days);

  const saveVisit = () => {
    if (!visitDate) return;
    update((d) => { d.nextVisit = { date: visitDate, note: visitNote.trim() }; return d; },
      `set the next visit: ${fmtDate(visitDate)}${visitNote ? " — " + visitNote.trim() : ""}`);
    setEditingVisit(false); setVisitDate(""); setVisitNote("");
  };
  const addDump = () => {
    if (!dump.trim()) return;
    addInboxItem(dump.trim());
    setDump("");
  };

  const partner = PEOPLE[me === "shane" ? "molly" : "shane"];
  return html`
    <div>
      <div class="card tapwrap">
        <button class="tapbtn" style=${{ background: `radial-gradient(circle at 35% 30%, ${PEOPLE[me].light}, ${PEOPLE[me].color} 70%)`, color: "#FBF8F1" }}
          onClick=${sendTap} aria-label="Send a tap to ${partner.name}">💓</button>
        <p style=${{ fontSize: "13px", color: "#5B5647", margin: "10px 0 0" }}>
          One tap. ${partner.name}'s phone lights up in your color.
        </p>
        ${lastTap && html`
          <p style=${{ fontSize: "12px", color: "#6E6754", margin: "4px 0 0" }}>
            Last tap: ${PEOPLE[lastTap.who].name}, ${relTs(lastTap.ts)}
          </p>`}
        ${!notifOn && html`
          <button class="ghost" style=${{ marginTop: "10px" }} onClick=${askNotif}>
            Turn on buzzes for when ${partner.name} taps
          </button>`}
      </div>
      <div class="card" style=${{ display: "flex", gap: "18px", alignItems: "center", justifyContent: "space-around", textAlign: "center", flexWrap: "wrap" }}>
        <div>
          <p class="bignum">${daysTogether}</p>
          <p class="eyebrow" style=${{ marginTop: "4px" }}>days of us</p>
        </div>
        <div>
          ${visit && !visitPassed ? html`
            <p class="bignum" style=${{ color: "#1D5C63" }}>${visitDays === 0 ? "🎉" : visitDays}</p>
            <p class="eyebrow" style=${{ marginTop: "4px" }}>${visitDays === 0 ? "you're together today" : "days until you're together"}</p>
          ` : html`
            <p class="bignum" style=${{ color: "#D8D2C4" }}>?</p>
            <p class="eyebrow" style=${{ marginTop: "4px" }}>next visit not set</p>
          `}
        </div>
      </div>

      <div class="card">
        <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <h2 style=${{ margin: 0 }}>Next time together</h2>
          <button class="ghost" onClick=${() => setEditingVisit(!editingVisit)}>${visit ? "change" : "set it"}</button>
        </div>
        ${visit && !editingVisit && html`
          <p style=${{ fontSize: "14px", color: "#44403A", margin: "8px 0 0" }}>
            ${fmtDate(visit.date)} · <strong>${rel(visitDays)}</strong>
            ${visit.note && html`<span style=${{ color: "#6E6754" }}> — ${visit.note}</span>`}
            ${visitPassed && html`<span style=${{ color: "#B4552D" }}> · that one's past — set the next one 💛</span>`}
          </p>`}
        ${!visit && !editingVisit && html`<p class="empty">Time blindness antidote #1: always know the next time you'll see each other.</p>`}
        ${editingVisit && html`
          <div>
            <div class="row" style=${{ marginTop: "8px" }}>
              <span><label>Date</label><input type="date" value=${visitDate} onInput=${(e) => setVisitDate(e.target.value)} /></span>
              <span><label>Plan (optional)</label><input value=${visitNote} onInput=${(e) => setVisitNote(e.target.value)} placeholder="her place, weekend" /></span>
            </div>
            <button class="btn" style=${{ marginTop: "12px" }} onClick=${saveVisit}>Save</button>
          </div>`}
      </div>

      <div class="card">
        <h2>Next 3 weeks</h2>
        ${horizon.length === 0 && html`<p class="empty">Clear horizon. Nothing due, nothing scheduled.</p>`}
        ${horizon.slice(0, 8).map((hz, i) => html`
          <div key=${i} style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #F0EBDD", gap: "8px" }}>
            <span style=${{ fontSize: "14px", color: "#22333B", flex: 1 }}>${hz.label}</span>
            <span class=${hz.days <= 3 ? "chip soon" : "chip"}>${rel(hz.days)} · ${fmtDate(hz.date)}</span>
          </div>`)}
      </div>

      <div class="card">
        <h2>Brain dump</h2>
        <p style=${{ fontSize: "13px", color: "#6E6754", margin: "0 0 8px" }}>Catch the thought before it escapes. Sort it later. Or never.</p>
        <div class="row">
          <input value=${dump} onInput=${(e) => setDump(e.target.value)} onKeyDown=${(e) => e.key === "Enter" && addDump()} placeholder="that thing I keep forgetting to tell you…" />
          <button class="btn sub" style=${{ flex: "0 0 auto" }} onClick=${addDump}>Dump</button>
        </div>
        ${(inboxItems || []).map((it) => html`
          <div key=${it.id} style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #F0EBDD", gap: "8px" }}>
            <span style=${{ fontSize: "14px", color: "#22333B" }}>
              <${Who} who=${it.who} initialOnly /> <span style=${{ marginLeft: "6px" }}>${it.text}</span>
            </span>
            <span style=${{ fontSize: "12px", color: "#6E6754", whiteSpace: "nowrap" }}>
              ${rel(relDays(it.date))}
              <button class="del" aria-label="Delete" onClick=${() => deleteInboxItem(it)}>✕</button>
            </span>
          </div>`)}
      </div>
    </div>`;
}

// ---------- US ----------
function Us({ data, update, me, showUndo }) {
  const [msTitle, setMsTitle] = useState("");
  const [msDate, setMsDate] = useState("");
  const [memText, setMemText] = useState("");
  const [annEdit, setAnnEdit] = useState(false);
  const [annVal, setAnnVal] = useState(data.anniversary);

  const addMilestone = () => {
    if (!msTitle.trim() || !msDate) return;
    const t = msTitle.trim();
    update((d) => {
      d.milestones.push({ id: uid(), title: t, date: msDate, who: me });
      d.milestones.sort((a, b) => a.date.localeCompare(b.date));
      return d;
    }, `added a milestone: ${t}`);
    setMsTitle(""); setMsDate("");
  };
  const addMemory = () => {
    if (!memText.trim()) return;
    const t = memText.trim();
    update((d) => { d.memories.unshift({ id: uid(), text: t, who: me, date: todayStr() }); d.memories = d.memories.slice(0, 60); return d; }, "jarred a memory 🫙");
    setMemText("");
  };

  return html`
    <div>
      <div class="card">
        <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <h2 style=${{ margin: 0 }}>Day zero</h2>
          ${!annEdit && html`<button class="ghost" onClick=${() => { setAnnVal(data.anniversary); setAnnEdit(true); }}>edit</button>`}
        </div>
        ${annEdit ? html`
          <div class="row" style=${{ marginTop: "8px", alignItems: "flex-end" }}>
            <span><label>First date</label><input type="date" value=${annVal} onInput=${(e) => setAnnVal(e.target.value)} /></span>
            <button class="btn" style=${{ flex: "0 0 auto" }} onClick=${() => { update((d) => { d.anniversary = annVal; return d; }, "corrected day zero"); setAnnEdit(false); }}>Save</button>
          </div>` : html`
          <p style=${{ fontSize: "14px", color: "#44403A", margin: "8px 0 0" }}>
            ${new Date(data.anniversary + "T12:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })}
            ${" "}· ${-relDays(data.anniversary)} days and counting. This date drives every counter in the app.
          </p>`}
      </div>

      <div class="card">
        <h2>Milestones</h2>
        <div style=${{ borderLeft: "3px solid #E4DECF", paddingLeft: "14px", marginLeft: "4px" }}>
          ${(data.milestones || []).map((m) => html`
            <div key=${m.id} style=${{ position: "relative", padding: "6px 0 14px" }}>
              <span style=${{ position: "absolute", left: "-21px", top: "12px", width: "11px", height: "11px", borderRadius: "50%", background: PEOPLE[m.who].color, border: "2px solid #FBF8F1" }}></span>
              <p style=${{ fontSize: "15px", fontWeight: 600, color: "#22333B", margin: 0 }}>${m.title}</p>
              <p style=${{ fontSize: "12px", color: "#6E6754", margin: "2px 0 0" }}>
                ${new Date(m.date + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })} · ${rel(relDays(m.date))}
                <button class="del" aria-label="Delete" onClick=${() => { update((d) => { d.milestones = d.milestones.filter((x) => x.id !== m.id); return d; }); showUndo(`"${m.title}" removed`, () => update((d) => { d.milestones.push(m); d.milestones.sort((a, b) => a.date.localeCompare(b.date)); return d; })); }}>✕</button>
              </p>
            </div>`)}
        </div>
        <div class="row" style=${{ marginTop: "8px" }}>
          <span style=${{ flex: 2 }}><label>What happened</label><input value=${msTitle} onInput=${(e) => setMsTitle(e.target.value)} placeholder="Said I love you, met the dogs…" /></span>
          <span><label>When</label><input type="date" value=${msDate} onInput=${(e) => setMsDate(e.target.value)} /></span>
        </div>
        <button class="btn" style=${{ marginTop: "12px" }} onClick=${addMilestone}>Add milestone</button>
      </div>

      <div class="card">
        <h2>Memory jar</h2>
        <p style=${{ fontSize: "13px", color: "#6E6754", margin: "0 0 8px" }}>Small good moments, logged before the ADHD eats them. Future-you will love past-you for this.</p>
        <div class="row">
          <input value=${memText} onInput=${(e) => setMemText(e.target.value)} onKeyDown=${(e) => e.key === "Enter" && addMemory()} placeholder="She laughed so hard at…" />
          <button class="btn sub" style=${{ flex: "0 0 auto" }} onClick=${addMemory}>Jar it</button>
        </div>
        ${(data.memories || []).map((m) => html`
          <div key=${m.id} style=${{ padding: "10px 0", borderBottom: "1px solid #F0EBDD" }}>
            <p style=${{ fontSize: "14px", color: "#22333B", margin: 0 }}>${m.text}</p>
            <p style=${{ fontSize: "12px", color: "#6E6754", margin: "4px 0 0" }}>
              <${Who} who=${m.who} initialOnly /> · ${fmtDate(m.date)} · ${rel(relDays(m.date))}
              <button class="del" aria-label="Delete" onClick=${() => { update((d) => { d.memories = d.memories.filter((x) => x.id !== m.id); return d; }); showUndo("Memory removed", () => update((d) => { d.memories.unshift(m); return d; })); }}>✕</button>
            </p>
          </div>`)}
      </div>
    </div>`;
}

// ---------- MONEY ----------
function Money({ data, update, me, showUndo, askConfirm }) {
  const [goalForm, setGoalForm] = useState({ name: "", target: "", weekly: "" });
  const [depDrafts, setDepDrafts] = useState({});

  const addGoal = () => {
    if (!goalForm.name.trim() || !Number(goalForm.target)) return;
    const nm = goalForm.name.trim();
    update((d) => {
      d.goals.push({ id: uid(), name: nm, target: Number(goalForm.target), weekly: Number(goalForm.weekly) || 0, deposits: [] });
      return d;
    }, `added a goal: ${nm}`);
    setGoalForm({ name: "", target: "", weekly: "" });
  };
  const addDeposit = (goalId) => {
    const g = data.goals.find((x) => x.id === goalId);
    const amt = Number(depDrafts[goalId] || g.weekly);
    if (!amt || amt <= 0) return;
    update((d) => {
      d.goals.find((x) => x.id === goalId).deposits.unshift({ id: uid(), who: me, amount: amt, date: todayStr() });
      return d;
    }, `put ${fmt$(amt)} into ${g.name}`);
    setDepDrafts({ ...depDrafts, [goalId]: "" });
  };

  return html`
    <div>
      ${(data.goals || []).map((g) => {
        const total = g.deposits.reduce((s, x) => s + Number(x.amount || 0), 0);
        const pct = g.target > 0 ? total / g.target : 0;
        const weeksLeft = g.weekly > 0 && g.target > total ? Math.ceil((g.target - total) / g.weekly) : 0;
        const eta = new Date(Date.now() + weeksLeft * 7 * 86400000);
        return html`
          <div key=${g.id} class="card">

// ---------- Bills ----------
function Bills({ data, update, showUndo }) {
  const [form, setForm] = useState({ name: "", amount: "", dueDay: "1", who: "both" });
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const add = () => {
    if (!form.name.trim()) return;
    const nm = form.name.trim();
    update((d) => {
      d.bills.push({ id: uid(), name: nm, amount: Number(form.amount) || 0, dueDay: Math.max(1, Math.min(31, Number(form.dueDay) || 1)), who: form.who });
      return d;
    }, `added a bill: ${nm}`);
    setForm({ name: "", amount: "", dueDay: "1", who: "both" });
  };
  const sorted = [...(data.bills || [])].sort((a, b) => nextOccurrence(a.dueDay) - nextOccurrence(b.dueDay));
  const monthlyTotal = sorted.reduce((s, b) => s + (b.amount || 0), 0);

  return html`
    <div class="card">
      <h2>Joint bills</h2>
      ${sorted.length > 0 && html`<p style=${{ fontSize: "13px", color: "#6E6754", margin: "0 0 8px" }}>${fmt$(monthlyTotal)} / month across ${sorted.length} bill${sorted.length > 1 ? "s" : ""} — these also show on Today's horizon</p>`}
      ${sorted.length === 0 && html`<p class="empty">No bills yet. Anything you split — add it once, it reminds you forever.</p>`}
      ${sorted.map((b) => {
        const due = nextOccurrence(b.dueDay);
        const days = Math.round((due - midnight()) / 86400000);
        return html`
          <div key=${b.id} style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #F0EBDD", gap: "8px" }}>
            <span style=${{ fontSize: "14px", color: "#22333B", fontFamily: "Public Sans, sans-serif" }}>
              <strong>${b.name}</strong>
              ${b.amount > 0 && html`<span style=${{ color: "#6E6754" }}> · ${fmt$(b.amount)}</span>`}
              <span style=${{ marginLeft: "8px" }}><${Who} who=${b.who} /></span>
            </span>
            <span style=${{ whiteSpace: "nowrap" }}>
              <span class=${days <= 5 ? "chip soon" : "chip"}>${rel(days)} · ${due.toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span>
              <button class="del" aria-label="Delete" onClick=${() => { update((d) => { d.bills = d.bills.filter((x) => x.id !== b.id); return d; }); showUndo(`"${b.name}" removed`, () => update((d) => { d.bills.push(b); return d; })); }}>✕</button>
            </span>
          </div>`;
      })}
      <div class="row" style=${{ marginTop: "12px" }}>
        <span style=${{ flex: 2 }}><label>Bill</label><input value=${form.name} onInput=${set("name")} placeholder="Internet" /></span>
        <span><label>Amount</label><input type="number" value=${form.amount} onInput=${set("amount")} placeholder="80" /></span>
      </div>
      <div class="row">
        <span><label>Due day of month</label><input type="number" min="1" max="31" value=${form.dueDay} onInput=${set("dueDay")} /></span>
        <span><label>Whose bill</label>
          <select value=${form.who} onChange=${set("who")}>
            <option value="both">Both (joint)</option>
            <option value="shane">Shane</option>
            <option value="molly">Molly</option>
          </select>
        </span>
      </div>
      <button class="btn" style=${{ marginTop: "12px" }} onClick=${add}>Add bill</button>
    </div>`;
}

// ---------- HOUSE ----------
function House({ data, update, me, showUndo, askConfirm, comments, addComment }) {
  const [text, setText] = useState("");
  const [type, setType] = useState("must");
  const [form, setForm] = useState({ address: "", link: "", price: "", notes: "" });
  const [pinText, setPinText] = useState("");

  const onLink = (e) => {
    const link = e.target.value;
    const next = { ...form, link };
    if (!form.address.trim()) {
      const parsed = addressFromLink(link);
      if (parsed) next.address = parsed;
    }
    setForm(next);
  };

  const addCriterion = () => {
    if (!text.trim()) return;
    const t = text.trim();
    update((d) => { d.criteria.push({ id: uid(), text: t, type, shane: me === "shane", molly: me === "molly" }); return d; }, `added to the house list: ${t}`);
    setText("");
  };
  const addHouse = () => {
    if (!form.address.trim() && !form.link.trim()) return;
    const label = form.address.trim() || "a mystery house";
    update((d) => { d.houses.unshift({ id: uid(), ...form, addedBy: me, shaneRating: 0, mollyRating: 0, status: "saved" }); return d; }, `saved a house: ${label}`);
    setForm({ address: "", link: "", price: "", notes: "" });
  };
  const addPin = () => {
    const raw = pinText.trim();
    if (!raw) return;
    const isUrl = /^https?:\/\//i.test(raw);
    update((d) => { d.board.unshift({ id: uid(), text: isUrl ? "" : raw, url: isUrl ? raw : "", who: me }); d.board = d.board.slice(0, 40); return d; }, "pinned to the vision board");
    setPinText("");
  };

  const statuses = ["saved", "want to see", "toured", "no"];
  const musts = (data.criteria || []).filter((c) => c.type === "must");
  const mustTotal = musts.length;
  const mustAgreed = musts.filter((c) => c.shane && c.molly).length;
  const section = (t, title) => {
    const items = (data.criteria || []).filter((c) => c.type === t);
    return html`
      <div>
        <h3>${title}</h3>
        ${items.length === 0 && html`<p class="empty">Nothing here yet.</p>`}
        ${items.map((c) => html`
          <div key=${c.id} style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #F0EBDD", gap: "8px" }}>
            <span style=${{ fontSize: "15px", color: "#22333B", flex: 1, fontFamily: "Public Sans, sans-serif" }}>${c.text}</span>
            <span style=${{ display: "flex", gap: "6px", alignItems: "center" }}>
              ${["shane", "molly"].map((w) => html`
                <button key=${w} title="${PEOPLE[w].name} agrees"
                  onClick=${() => update((d) => { const it = d.criteria.find((x) => x.id === c.id); it[w] = !it[w]; return d; })}
                  style=${{ width: "26px", height: "26px", borderRadius: "50%", border: `2px solid ${PEOPLE[w].color}`, background: c[w] ? PEOPLE[w].color : "transparent", color: c[w] ? "#FFF" : PEOPLE[w].color, fontSize: "11px", fontWeight: 700, cursor: "pointer" }}>
                  ${PEOPLE[w].name[0]}
                </button>`)}
              <button class="del" aria-label="Delete" onClick=${() => update((d) => { d.criteria = d.criteria.filter((x) => x.id !== c.id); return d; })}>✕</button>
            </span>
          </div>`)}
      </div>`;
  };

  return html`
    <div>
      <div class="card">
        <h2>The list</h2>
        <p style=${{ fontSize: "13px", color: "#6E6754", margin: "0 0 4px" }}>Both circles filled = it's official.</p>
        ${mustTotal > 0 && html`
          <div style=${{ margin: "6px 0 14px" }}>
            <div style=${{ display: "flex", justifyContent: "space-between", fontSize: "12px", color: "#6E6754", marginBottom: "4px" }}>
              <span>Must-haves agreed</span><span>${mustAgreed}/${mustTotal}</span>
            </div>
            <div style=${{ height: "8px", borderRadius: "999px", background: "#EFE9DB", overflow: "hidden" }}>
              <div style=${{ height: "100%", width: `${(mustAgreed / mustTotal) * 100}%`, background: "#1D5C63" }}></div>
            </div>
          </div>`}
        ${section("must", "Must-haves")}
        ${section("nice", "Nice-to-haves")}
        <div class="row" style=${{ marginTop: "10px" }}>
          <span style=${{ flex: 2 }}><input value=${text} onInput=${(e) => setText(e.target.value)} onKeyDown=${(e) => e.key === "Enter" && addCriterion()} placeholder="Room for a dog yard…" /></span>
          <select value=${type} onChange=${(e) => setType(e.target.value)} style=${{ width: "auto" }}>
            <option value="must">Must</option>
            <option value="nice">Nice</option>
          </select>
          <button class="btn sub" style=${{ flex: "0 0 auto" }} onClick=${addCriterion}>Add</button>
        </div>
      </div>

      <div class="card">
        <h2>Save a listing</h2>
        <label>Zillow / Realtor / Redfin link — address autofills</label>
        <input value=${form.link} onInput=${onLink} placeholder="https://www.zillow.com/homedetails/…" />
        <div class="row">
          <span style=${{ flex: 2 }}><label>Address or nickname</label><input value=${form.address} onInput=${(e) => setForm({ ...form, address: e.target.value })} placeholder="autofills from the link" /></span>
          <span><label>Asking</label><input value=${form.price} onInput=${(e) => setForm({ ...form, price: e.target.value })} placeholder="$375k" /></span>
        </div>
        <label>Notes</label>
        <textarea rows="2" value=${form.notes} onInput=${(e) => setForm({ ...form, notes: e.target.value })} placeholder="1.5 bath ✓, hear the highway? check"></textarea>
        <button class="btn" style=${{ marginTop: "12px" }} onClick=${addHouse}>Save house</button>
      </div>

      ${(data.houses || []).map((hh) => {
        const both = hh.shaneRating >= 4 && hh.mollyRating >= 4;
        return html`
          <div key=${hh.id} class="card" style=${both ? { borderColor: "#1D5C63", borderWidth: "2px" } : {}}>
            <div style=${{ display: "flex", justifyContent: "space-between", gap: "8px" }}>
              <div>
                <p style=${{ fontFamily: "Fraunces, serif", fontSize: "17px", fontWeight: 650, margin: "0 0 2px", color: "#22333B" }}>${hh.address || "Untitled house"} ${both ? "🤝" : ""}</p>
                <p style=${{ fontSize: "13px", color: "#6E6754", margin: 0 }}>
                  ${hh.price && html`<strong>${hh.price} · </strong>`}

                </p>
              </div>
              <select value=${hh.status}
                onChange=${(e) => { const v = e.target.value; update((d) => { d.houses.find((x) => x.id === hh.id).status = v; return d; }, `moved ${hh.address || "a house"} to "${v}"`); }}
                style=${{ width: "auto", fontSize: "12px", padding: "6px 8px", alignSelf: "flex-start" }}>
                ${statuses.map((s) => html`<option key=${s}>${s}</option>`)}
              </select>
            </div>
            ${hh.notes && html`<p style=${{ fontSize: "14px", color: "#44403A", margin: "8px 0 0" }}>${hh.notes}</p>`}
            <div style=${{ display: "flex", gap: "20px", marginTop: "10px", flexWrap: "wrap", fontFamily: "Public Sans, sans-serif" }}>
              ${["shane", "molly"].map((w) => html`
                <span key=${w} style=${{ fontSize: "13px", color: "#6E6754" }}>
                  ${PEOPLE[w].name}:${" "}
                  <${Stars} value=${hh[w + "Rating"]} color=${PEOPLE[w].color} readOnly=${me !== w}
                    onChange=${(v) => update((d) => { d.houses.find((x) => x.id === hh.id)[w + "Rating"] = v; return d; }, `rated ${hh.address || "a house"} ${v}★`)} />
                </span>`)}
              <button class="del" style=${{ marginLeft: "auto" }} onClick=${() => askConfirm("Remove this house?", () => { update((d) => { d.houses = d.houses.filter((x) => x.id !== hh.id); return d; }); showUndo(`"${hh.address || "House"}" removed`, () => update((d) => { d.houses.unshift(hh); return d; })); })}>remove</button>

      <div class="card">
        <h2>Vision board</h2>
        <div class="row">

              <${Who} who=${b.who} initialOnly />

              <button class="del" aria-label="Delete" onClick=${() => update((d) => { d.board = d.board.filter((x) => x.id !== b.id); return d; })}>✕</button>
            </div>`)}
        </div>
      </div>
    </div>`;
}

// ---------- LISTS ----------
function StoreLists({ data, update, me, showUndo, askConfirm }) {
  const [name, setName] = useState("");
  const [drafts, setDrafts] = useState({});

  const addList = () => {
    if (!name.trim()) return;
    const nm = name.trim();
    update((d) => { d.lists.push({ id: uid(), name: nm, items: [] }); return d; }, `made a list: ${nm}`);
    setName("");
  };
  const addItem = (listId, listName) => {
    const t = (drafts[listId] || "").trim();
    if (!t) return;
    update((d) => { d.lists.find((l) => l.id === listId).items.push({ id: uid(), text: t, done: false, who: me }); return d; }, `added "${t}" to ${listName}`);
    setDrafts({ ...drafts, [listId]: "" });
  };

  return html`
    <div>
      <div class="card">
        <h2>New list</h2>
        <div class="row">
          <span style=${{ flex: 2 }}><input value=${name} onInput=${(e) => setName(e.target.value)} onKeyDown=${(e) => e.key === "Enter" && addList()} placeholder="Stop & Shop, Home Depot, packing list…" /></span>
          <button class="btn" onClick=${addList} style=${{ flex: "0 0 auto" }}>Create</button>
        </div>
      </div>
      ${(data.lists || []).map((l) => {
        const doneCount = l.items.filter((i) => i.done).length;
        return html`
          <div key=${l.id} class="card">
            <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <h2 style=${{ margin: 0 }}>${l.name}</h2>
              <span style=${{ fontSize: "12px", color: "#6E6754", fontFamily: "Public Sans, sans-serif" }}>
                ${l.items.length > 0 && `${doneCount}/${l.items.length}`}
                <button class="del" aria-label="Delete" onClick=${() => askConfirm(`Delete list "${l.name}"?`, () => { update((d) => { d.lists = d.lists.filter((x) => x.id !== l.id); return d; }); showUndo(`List "${l.name}" deleted`, () => update((d) => { d.lists.push(l); return d; })); })}>delete</button>
              </span>
            </div>
            ${l.items.map((it) => html`
              <div key=${it.id} style=${{ display: "flex", alignItems: "center", gap: "10px", padding: "7px 0", borderBottom: "1px solid #F0EBDD" }}>
                <button aria-label=${it.done ? "Mark not done" : "Mark done"}
                  onClick=${() => update((d) => { const x = d.lists.find((y) => y.id === l.id).items.find((y) => y.id === it.id); x.done = !x.done; return d; })}
                  style=${{ width: "22px", height: "22px", borderRadius: "6px", cursor: "pointer", flexShrink: 0, border: "2px solid #1D5C63", background: it.done ? "#1D5C63" : "transparent", color: "#FFF", fontSize: "13px", lineHeight: 1 }}>
                  ${it.done ? "✓" : ""}
                </button>
                <span style=${{ fontSize: "15px", color: it.done ? "#6E6754" : "#22333B", textDecoration: it.done ? "line-through" : "none", flex: 1, fontFamily: "Public Sans, sans-serif" }}>${it.text}</span>
                <${Who} who=${it.who} initialOnly />
              </div>`)}
            <div class="row" style=${{ marginTop: "10px" }}>
              <input value=${drafts[l.id] || ""} onInput=${(e) => setDrafts({ ...drafts, [l.id]: e.target.value })} onKeyDown=${(e) => e.key === "Enter" && addItem(l.id, l.name)} placeholder="Add an item…" />
              <button class="btn sub" style=${{ flex: "0 0 auto" }} onClick=${() => addItem(l.id, l.name)}>Add</button>
            </div>
            ${doneCount > 0 && html`
              <button class="ghost" style=${{ marginTop: "10px" }}
                onClick=${() => update((d) => { const x = d.lists.find((y) => y.id === l.id); x.items = x.items.filter((i) => !i.done); return d; })}>
                Clear ${doneCount} checked
              </button>`}
          </div>`;
      })}
    </div>`;
}

  const addDate = () => {
    if (!title.trim() || !date) return;
    const t = title.trim();
    update((d) => {
      d.dates.push({ id: uid(), title: t, date, who: me });
      d.dates.sort((a, b) => a.date.localeCompare(b.date));
      return d;
    }, `added a plan: ${t} (${fmtDate(date)})`);

    if (!tripForm.name.trim()) return;

  };

  return html`

                <button class="del" aria-label="Delete" onClick=${() => update((x) => { x.dates = x.dates.filter((y) => y.id !== d.id); return x; })}>✕</button>
              </span>
            </div>`;
        })}
        <div class="row" style=${{ marginTop: "10px" }}>
          <span style=${{ flex: 2 }}><label>What</label><input value=${title} onInput=${(e) => setTitle(e.target.value)} placeholder="Devils game, her cousin's wedding…" /></span>
          <span><label>When</label><input type="date" value=${date} onInput=${(e) => setDate(e.target.value)} /></span>
        </div>
        <button class="btn" style=${{ marginTop: "12px" }} onClick=${addDate}>Add</button>
      </div>

      <div class="card">
        <h2>Dream up a trip</h2>
        <div class="row">
          <span style=${{ flex: 2 }}><label>Where</label><input value=${tripForm.name} onInput=${(e) => setTripForm({ ...tripForm, name: e.target.value })} placeholder="P-town, Iceland, a cabin somewhere…" /></span>
          <span><label>Roughly when</label><input value=${tripForm.when} onInput=${(e) => setTripForm({ ...tripForm, when: e.target.value })} placeholder="Fall 2026" /></span>
        </div>
        <button class="btn" style=${{ marginTop: "12px" }} onClick=${addTrip}>Add trip</button>
      </div>

      ${(data.trips || []).map((t) => html`
        <div key=${t.id} class="card">
          <div style=${{ display: "flex", justifyContent: "space-between", gap: "8px", alignItems: "flex-start" }}>
            <div>
              <p style=${{ fontFamily: "Fraunces, serif", fontSize: "17px", fontWeight: 650, margin: "0 0 2px", color: "#22333B" }}>${t.name}</p>
              <p style=${{ fontSize: "13px", color: "#6E6754", margin: 0 }}>${t.when && `${t.when} · `}dreamed up by ${PEOPLE[t.addedBy].name}</p>
            </div>
            <select value=${t.status}
              onChange=${(e) => { const v = e.target.value; update((d) => { d.trips.find((x) => x.id === t.id).status = v; return d; }, `moved ${t.name} to "${v}"`); }}
              style=${{ width: "auto", fontSize: "12px", padding: "6px 8px", color: statusColor[t.status], fontWeight: 600 }}>
              ${statuses.map((s) => html`<option key=${s}>${s}</option>`)}
            </select>
          </div>
          ${t.pins.length > 0 && html`
            <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginTop: "10px" }}>
              ${t.pins.map((p) => html`
                <div key=${p.id} style=${{ border: "1.5px solid #F0EBDD", borderRadius: "10px", padding: "8px 10px" }}>
                  <${Who} who=${p.who} initialOnly />
                  ${p.text && html`<p style=${{ fontSize: "13px", margin: "6px 0 0", color: "#22333B" }}>${p.text}</p>`}
                  ${p.url && html`<a href=${p.url} target="_blank" rel="noreferrer" style=${{ fontSize: "12px", color: "#1D5C63", wordBreak: "break-all", display: "block", marginTop: "6px", fontFamily: "Public Sans, sans-serif" }}>open ↗</a>`}
                  <button class="del" aria-label="Delete" onClick=${() => update((d) => { const x = d.trips.find((y) => y.id === t.id); x.pins = x.pins.filter((y) => y.id !== p.id); return d; })}>✕</button>
                </div>`)}
            </div>`}
          <div class="row" style=${{ marginTop: "10px" }}>
            <input value=${pinDrafts[t.id] || ""} onInput=${(e) => setPinDrafts({ ...pinDrafts, [t.id]: e.target.value })} onKeyDown=${(e) => e.key === "Enter" && addPin(t.id, t.name)} placeholder="Pin an idea, or paste a link…" />
            <button class="btn sub" style=${{ flex: "0 0 auto" }} onClick=${() => addPin(t.id, t.name)}>Pin</button>
          </div>
          <${Comments} items=${comments.filter((c) => c.parentId === `trip:${t.id}`)} me=${me}
            onAdd=${(txt) => addComment(`trip:${t.id}`, txt)} />
          <button class="del" style=${{ marginTop: "8px" }} onClick=${() => askConfirm(`Delete trip "${t.name}"?`, () => { update((d) => { d.trips = d.trips.filter((x) => x.id !== t.id); return d; }); showUndo(`Trip "${t.name}" deleted`, () => update((d) => { d.trips.unshift(t); return d; })); })}>delete trip</button>
        </div>`)}
    </div>`;
}

render(html`<${App} />`, document.getElementById("app"));
</script>
</body>
</html>
